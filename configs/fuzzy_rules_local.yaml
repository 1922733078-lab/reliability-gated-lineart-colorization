labels:
- E0
- E5
- E14
- E_FULL
fallback_label: E14
priors:
  E0: 0.03
  E5: 0.05
  E14: 0.04
  E_FULL: 0.0
variables:
  line_density:
    very_low:
      type: trapmf
      params:
      - 0.0
      - 0.0
      - 0.03
      - 0.06
    low:
      type: trimf
      params:
      - 0.03
      - 0.08
      - 0.14
    medium:
      type: trimf
      params:
      - 0.1
      - 0.18
      - 0.28
    high:
      type: trapmf
      params:
      - 0.22
      - 0.3
      - 1.0
      - 1.0
  edge_entropy:
