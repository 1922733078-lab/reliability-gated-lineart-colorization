rules:
- name: extremely_blank_minimal_prefers_efull
  if:
    line_density: very_low
    blank_ratio: high
    component_density: low
    complexity_score: low
  then: E_FULL
  weight: 1.5
  operator: min
- name: sparse_uncertain_prefers_e5
  if:
    line_density: low
    edge_entropy: medium
    blank_ratio: high
  then: E5
  weight: 1.15
  operator: mean
- name: low_density_complex_prefers_e5
  if:
    line_density: low
    complexity_score: high
    blank_ratio: medium
  then: E5
  weight: 1.0
  operator: mean
- name: broad_middle_prefers_e5
  if:
    complexity_score: medium
    component_density: medium
    edge_entropy: medium
  then: E5
  weight: 0.95
  operator: mean
- name: dense_complex_prefers_e14
  if:
    line_density: high
    component_density: high
    edge_entropy: high
  then: E14
  weight: 1.25
  operator: min
- name: high_component_prefers_e14
  if:
    complexity_score: high
    edge_entropy: high
    component_density: high
  then: E14
  weight: 1.1
  operator: mean
- name: medium_dense_entropy_prefers_e0
  if:
    line_density: medium
    edge_entropy: high
    component_density: medium
  then: E0
  weight: 1.2
  operator: mean
- name: dense_clean_prefers_e0
  if:
    line_density: high
    component_density: medium
    complexity_score: medium
  then: E0
  weight: 1.0
  operator: mean
- name: entropy_with_moderate_components_prefers_e0
  if:
    edge_entropy: high
    component_density: medium
    blank_ratio: medium
  then: E0
  weight: 0.95
  operator: mean
selection_policy:
  mode: e5_default_conservative
  default_label: E5
  fallback_to_default: true
  cost_sensitive_mode: true
  min_margin: 0.0
  min_expected_gain: 0.0
  override_requirements:
    E0:
      line_density: medium
      component_density: medium
      blank_ratio: medium
      edge_entropy: high
    E14:
      line_density: high
      component_density: high
      edge_entropy: high
    E_FULL:
      line_density: very_low
      blank_ratio: high
      component_density: low
      complexity_score: low
